name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: api/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: api

  python-worker:
    name: Python Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/

      - name: Type check
        run: uv run mypy src/crosswind --ignore-missing-imports

      - name: Test
        run: uv run pytest tests/ -v --tb=short || echo "No tests yet"

  python-context-processor:
    name: Python Context Processor
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: context-processor
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/ || echo "Ruff not configured"

      - name: Test
        run: uv run pytest tests/ -v --tb=short || echo "No tests yet"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Context Processor
        uses: docker/build-push-action@v6
        with:
          context: ./context-processor
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
