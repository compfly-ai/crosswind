name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
        description: "Version to release (e.g. v0.1.16). If empty, auto-increments patch from latest tag."

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          EVENT: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            if [[ -n "$INPUT_VERSION" ]]; then
              VERSION="$INPUT_VERSION"
            else
              # Auto-increment: find latest semver tag and bump patch
              LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
              if [[ -z "$LATEST_TAG" ]]; then
                echo "No existing semver tags found; cannot auto-increment" >&2
                exit 1
              fi
              # Strip v prefix, split, bump patch
              SEMVER="${LATEST_TAG#v}"
              MAJOR=$(echo "$SEMVER" | cut -d. -f1)
              MINOR=$(echo "$SEMVER" | cut -d. -f2)
              PATCH=$(echo "$SEMVER" | cut -d. -f3)
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              echo "Auto-incremented from $LATEST_TAG to v$VERSION"
            fi
          else
            # For tag pushes, github.ref_name will be the tag name, e.g. v0.1.9
            VERSION="$REF_NAME"
          fi

          # Normalize: if VERSION starts with 'v', strip it (v1.2.3 -> 1.2.3)
          VERSION="${VERSION#v}"

          if [[ -z "$VERSION" ]]; then
            echo "Derived version is empty; aborting" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push Context Processor
        uses: docker/build-push-action@v6
        with:
          context: ./context-processor
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-context-processor:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-context-processor:latest
          cache-from: type=gha,scope=context-processor
          cache-to: type=gha,mode=max,scope=context-processor

      - name: Create sub-package tags
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for prefix in api worker context-processor; do
            tag="${prefix}/v${VERSION}"
            git tag "$tag" HEAD
            git push origin "$tag"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: v${{ steps.version.outputs.version }}
