services:
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      - PORT=8080
      - ENVIRONMENT=development
      - MONGO_URI=mongodb://mongo:27017
      - DATABASE_NAME=agent_eval
      - REDIS_URL=redis://redis:6379
      - STORAGE_PROVIDER=local
      - AGENT_EVAL_DATA_DIR=/data
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - API_KEY=${API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DOCS_USERNAME=${DOCS_USERNAME:-}
      - DOCS_PASSWORD=${DOCS_PASSWORD:-}
    volumes:
      - agent_eval_data:/data
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - DATABASE_NAME=agent_eval
      - REDIS_URL=redis://redis:6379
      - STORAGE_PROVIDER=local
      - AGENT_EVAL_DATA_DIR=/data
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - agent_eval_data:/data
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  context-processor:
    build:
      context: ../context-processor
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - DATABASE_NAME=agent_eval
      - REDIS_URL=redis://redis:6379
      - STORAGE_PROVIDER=local
      - AGENT_EVAL_DATA_DIR=/data
    volumes:
      - agent_eval_data:/data
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agent_eval_data:
  mongo_data:
  redis_data:
